<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="Servoteh Lokacije">
  <title>Servoteh Lokacije</title>
  <!--
    Placeholder ikona za mobilni shell + PWA + Capacitor APK.
    Zamena: kada Servoteh marketing tim da finalni logo (PNG 1024×1024),
    dovoljno je overwrite-ovati public/icons/servoteh-lokacije.svg ili
    dodati novi `servoteh-lokacije.png` i a~urirati manifest.webmanifest.
  -->
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2563eb"/>
      <stop offset="100%" stop-color="#1d4ed8"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="12" flood-color="#000" flood-opacity="0.25"/>
    </filter>
  </defs>
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <g fill="#ffffff" filter="url(#shadow)">
    <!-- Stylizovana polica sa kutijom -->
    <rect x="88" y="280" width="336" height="28" rx="6"/>
    <rect x="88" y="392" width="336" height="28" rx="6"/>
    <rect x="128" y="172" width="112" height="108" rx="12" fill="#ffffff" fill-opacity="0.92"/>
    <rect x="272" y="204" width="112" height="76" rx="12" fill="#ffffff" fill-opacity="0.75"/>
    <rect x="128" y="308" width="80" height="80" rx="12" fill="#ffffff" fill-opacity="0.85"/>
    <rect x="232" y="324" width="152" height="64" rx="12" fill="#ffffff" fill-opacity="0.7"/>
    <!-- Pin/marker na vrhu -->
    <circle cx="256" cy="108" r="44" fill="#ffffff"/>
    <circle cx="256" cy="108" r="18" fill="#1d4ed8"/>
  </g>
</svg>
