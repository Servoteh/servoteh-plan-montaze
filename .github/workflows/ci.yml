name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  js-tests:
    name: JS unit tests (Vitest)
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run Vitest
        run: npm test

  sql-tests:
    name: SQL migrations + pgTAP
    runs-on: ubuntu-24.04
    # Postgres 15 se pokreće u Docker service containeru (izolovano od default
    # PG koji GitHub Actions runner već ima instaliran na portu 5432 — ranije
    # smo u istom koraku pokušavali apt-install PG 15 na host, ali je to stalno
    # kolidiralo sa host-ovim postgresql-* paketima i cluster-om).
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: ci_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d ci_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pgTAP extension into Postgres container
        run: |
          set -euo pipefail
          # Službeni postgres:15 image ima PGDG apt repo već konfigurisan, pa
          # možemo direktno instalirati postgresql-15-pgtap unutar kontejnera.
          CID=$(docker ps --filter "ancestor=postgres:15" --format "{{.ID}}" | head -n1)
          if [ -z "$CID" ]; then
            echo "Postgres service container not found" >&2
            docker ps -a
            exit 1
          fi
          echo "Installing pgTAP into container $CID"
          docker exec -u root "$CID" bash -c "
            set -euo pipefail
            apt-get update -qq
            apt-get install -y --no-install-recommends postgresql-15-pgtap
          "

      - name: Install psql client + pg_prove on runner
        run: |
          set -euo pipefail
          sudo apt-get update -qq
          # postgresql-client je iz Ubuntu 24.04 (PG 16 klijent — kompatibilan
          # sa serverom 15). libtap-parser-sourcehandler-pgtap-perl donosi
          # `pg_prove` binary za izvršavanje pgTAP test fajlova.
          sudo apt-get install -y --no-install-recommends \
            postgresql-client \
            libtap-parser-sourcehandler-pgtap-perl

      - name: Apply CI bootstrap
        env:
          PGPASSWORD: postgres
        run: |
          psql -h localhost -U postgres -d ci_test -v ON_ERROR_STOP=1 \
            -f sql/ci/00_bootstrap.sql

      - name: Apply migrations in order
        env:
          PGPASSWORD: postgres
        run: |
          set -uo pipefail
          mkdir -p /tmp/ci-logs
          overall_rc=0
          while IFS= read -r line; do
            # preskoči prazne i komentare
            [[ -z "$line" || "$line" =~ ^[[:space:]]*# ]] && continue
            echo ""
            echo "=================================================="
            echo ">>> APPLYING: $line"
            echo "=================================================="
            log_file="/tmp/ci-logs/$(echo "$line" | tr '/' '_').log"
            # -a echo-uje sve SQL naredbe pre izvršavanja u stdout.
            # NE koristimo `tee | ::group::` da GitHub UI ne collapsira izlaz
            # — sav output ide direktno na konzolu.
            psql -h localhost -U postgres -d ci_test \
                 -v ON_ERROR_STOP=1 -a -f "$line" > "$log_file" 2>&1
            rc=$?
            # Prikaži poslednjih 200 linija (ako fajl ogroman, vidimo greške na kraju).
            tail -n 200 "$log_file" || true
            if [ "$rc" -ne 0 ]; then
              echo ""
              echo "!!! psql exited with code $rc for: $line"
              echo "!!! FULL LOG ABOVE (last 200 lines of $log_file)"
              overall_rc=1
              break
            fi
          done < sql/ci/migrations.txt
          exit "$overall_rc"

      - name: Upload migration logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: migration-logs
          path: /tmp/ci-logs/
          if-no-files-found: warn

      - name: Run pgTAP tests
        env:
          PGPASSWORD: postgres
        run: |
          shopt -s nullglob
          tests=(sql/tests/*.sql)
          if [ ${#tests[@]} -eq 0 ]; then
            echo "Nema pgTAP testova u sql/tests/."
            exit 1
          fi
          pg_prove --verbose -h localhost -U postgres -d ci_test "${tests[@]}"

      - name: Dump Postgres container logs on failure
        if: failure()
        run: |
          CID=$(docker ps -a --filter "ancestor=postgres:15" --format "{{.ID}}" | head -n1) || true
          if [ -n "${CID:-}" ]; then
            echo "=== postgres:15 container logs ==="
            docker logs "$CID" || true
          fi
