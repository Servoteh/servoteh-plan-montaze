name: Build Android APK

# Gradi unsigned Android APK za Servoteh Lokacije mobilni shell.
#
# KADA SE OKIDA:
#   - na svaki push u main koji menja mobilni kod (`src/ui/mobile/**`,
#     `capacitor.config.json`, `android/**`, `vite.config.js`),
#   - manualno preko `workflow_dispatch` (dugme u GitHub UI-ju).
#
# ARTIFACT:
#   - `app-debug.apk` (unsigned, install preko USB/adb ili "nepoznati
#     izvori"). Ne objavljujemo na Play Store — distribucija je manuelna
#     za 2-3 telefona u magacinu.
#
# TROŠKOVI:
#   - ~5-6 min per run na `ubuntu-24.04` (Gradle cache + Android SDK).

on:
  push:
    branches: [main]
    paths:
      - 'src/ui/mobile/**'
      - 'src/services/offlineQueue.js'
      - 'src/services/nativeBarcode.js'
      - 'src/styles/mobile.css'
      - 'capacitor.config.json'
      - 'android/**'
      - 'vite.config.js'
      - 'public/icons/**'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/android-apk.yml'
  pull_request:
    branches: [main]
    paths:
      - 'src/ui/mobile/**'
      - 'capacitor.config.json'
      - 'android/**'
      - '.github/workflows/android-apk.yml'
  workflow_dispatch:

concurrency:
  group: apk-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-apk:
    name: Build Android debug APK
    runs-on: ubuntu-24.04
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Java 21 (Temurin)
        # Capacitor 8 + Android Gradle Plugin 8.7 zahteva JDK 21.
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm ci

      - name: Build web (Vite + PWA)
        run: npm run build
        env:
          # Ubacujemo kratak SHA u footer APK-a da magacioner vidi verziju.
          VITE_APP_VERSION: ${{ github.sha }}

      - name: Capacitor sync android
        run: npx cap sync android

      - name: Gradle cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            android/.gradle
          key: gradle-${{ runner.os }}-${{ hashFiles('android/**/*.gradle*', 'android/**/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: Build APK (assembleDebug)
        working-directory: android
        run: ./gradlew assembleDebug --stacktrace --no-daemon

      - name: Rename APK with build info
        run: |
          set -euo pipefail
          mkdir -p release
          src="android/app/build/outputs/apk/debug/app-debug.apk"
          if [ ! -f "$src" ]; then
            echo "::error::APK not produced at $src"
            ls -R android/app/build/outputs || true
            exit 1
          fi
          short_sha="${GITHUB_SHA::7}"
          ts=$(date -u +%Y%m%d-%H%M)
          out="release/servoteh-lokacije-${ts}-${short_sha}.apk"
          cp "$src" "$out"
          echo "APK_PATH=$out" >> "$GITHUB_ENV"
          echo "APK_NAME=$(basename "$out")" >> "$GITHUB_ENV"
          echo "--- APK info ---"
          ls -la "$out"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.APK_NAME }}
          path: ${{ env.APK_PATH }}
          # Artifactovi stoje 30 dana po defaultu; ostavljamo ih malo duže
          # jer se APK ne instalira svaki dan.
          retention-days: 60

      - name: Job summary
        run: |
          {
            echo "### 📱 Android APK build"
            echo ""
            echo "- **Artifact:** \`${APK_NAME}\`"
            echo "- **Commit:** \`${GITHUB_SHA::7}\`"
            echo ""
            echo "### Instalacija na telefonu"
            echo ""
            echo "1. **Preuzmi APK** sa Artifacts sekcije ovog job-a."
            echo "2. Na telefonu uključi **Settings → Security → Install unknown apps** za browser / Files app."
            echo "3. Otvori \`.apk\` fajl → Install."
            echo "4. Prva prijava: isti email + password kao na webu."
          } >> "$GITHUB_STEP_SUMMARY"
